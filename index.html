<!DOCTYPE html>
<html>
<head>
  <title>Presensi QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
      text-align: center;
      overflow-x: hidden;
      max-width: 100vw;
      touch-action: manipulation;
    }

    .judul { /* Tulisan SCAN PRESENSI */
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      color: navy;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px lightgray;
    }

    .judul span { /* Tuisan SMP NEGERI 12 PEKALONGAN */
      font-size: 32px;
      font-weight: bold;
      color: darkorange;
      display: block;
      margin-top: 8px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 2px gray;
    }


    #switch-btn {
      background-color: #007BFF; /* Biru cerah */
      color: white; /* Warna teks */
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    #switch-btn:hover {
      background-color: #0056b3; /* Biru tua saat hover */
      transform: scale(1.05); /* Efek zoom saat hover */
    }

    #switch-btn:active {
      background-color: #004080; /* Lebih gelap saat diklik */
      transform: scale(0.98);
    }

    #reader {
      width: 90vw;
      max-width: 900px;
      margin: 0 auto;
    }

    #status { /* Tuisan Mengirim .... */
      margin-top: 16px;
      font-weight: bold;
      min-height: 24px;
      font-size: 32px;
      color: gray;
    }
    .status-kecil {
      font-size: 16px;
      color: gray;
    }

    .status-besar { /* Tuisan Presensi Berhasil */
      font-size: 48px;
      color: green;
      font-weight: bold;
      line-height: 1.6;
    }

    .status-nama { /* Tuisan Nama dan Kelas  */
      font-size: 40px;
      color: black;
      font-weight: normal;
      margin-top: 8px;
      text-align: center;
    }

    button {
      padding: 10px 18px;
      font-size: 1rem;
      margin: 15px auto;
      display: inline-block;
      cursor: pointer;
    }

    body {
      overscroll-behavior: contain;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html {
      overflow: hidden;
      height: 100%;
      touch-action: none;
      -ms-touch-action: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <h2 class="judul">SCAN PRESENSI<br /><span>SMP NEGERI 12 PEKALONGAN</span></h2>
  <button id="switch-btn">Ganti Kamera</button>
  <div id="reader"></div>
  <div id="status">Memuat kamera...</div>
  <audio id="audio-success" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
  <audio id="audio-fail" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>

  <script>
    const scanner = new Html5Qrcode("reader");
    let cameraList = [];
    let currentCameraIndex = 0;

    async function startCamera() {
      try {
        if (cameraList.length === 0) {
          cameraList = await Html5Qrcode.getCameras();
          if (cameraList.length === 0) throw "Tidak ada kamera ditemukan.";
        }

        const cameraId = cameraList[currentCameraIndex].id;
        scanner.start(
          cameraId,
          {
            fps: 10,
            qrbox: function(viewfinderWidth, viewfinderHeight) {
              const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
              const boxSize = Math.floor(minEdge * 0.6);
              return { width: boxSize, height: boxSize };
            }
          },
          onScanSuccess,
          (error) => {}
        ).then(() => {
          document.getElementById("status").innerText = "Arahkan Kartu Presensi Ke Kamera";
        }).catch(err => {
          document.getElementById("status").innerText = "Gagal mulai kamera: " + err;
        });

      } catch (e) {
        document.getElementById("status").innerText = "❌ " + e;
      }
    }

    function onScanSuccess(qrCodeMessage) {
      scanner.stop().then(() => {
        kirimPresensi(qrCodeMessage.trim());
      });
    }

    function kirimPresensi(nisn) {
      //document.getElementById("status").className = "status-kecil";
      document.getElementById("status").innerText = "Mencatat...";

      google.script.run.withSuccessHandler(function(res) {
        const hasil = JSON.parse(res);

        if (hasil.status === "sukses") {
          document.getElementById("audio-success").play();
          document.getElementById("status").className = "";
          document.getElementById("status").innerHTML = `
            <div class="status-besar">Presensi Berhasil ✅</div>
            <div class="status-nama">Nama: <strong>${hasil.nama}</strong></div>
            <div class="status-nama">Kelas: <strong>${hasil.kelas}</strong></div>
          `;

          setTimeout(() => {
            startCamera();
          }, 1000);

        } else {
          document.getElementById("audio-fail").play();
          document.getElementById("status").innerHTML =
            "❌ <strong>NISN tidak ditemukan!</strong>";
          setTimeout(() => {
            startCamera();
          }, 1000);
        }
      }).kirimPresensi(nisn);
    }

    document.getElementById("switch-btn").onclick = function () {
      if (cameraList.length > 1) {
        scanner.stop().then(() => {
          currentCameraIndex = (currentCameraIndex + 1) % cameraList.length;
          startCamera();
        }).catch(err => {
          currentCameraIndex = (currentCameraIndex + 1) % cameraList.length;
          startCamera();
        });
      }
    };

    window.onload = function () {
      startCamera();
    };
  </script>

</body>
</html>
